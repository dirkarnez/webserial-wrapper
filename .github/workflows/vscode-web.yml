name: vscode-server
on:
  workflow_dispatch:
    inputs:
      chosen-os:
        required: true
        type: choice
        default: 'ubuntu-latest'
        options:
        - windows-latest
        - ubuntu-latest
        - macos-latest
        
permissions:
    contents: write
    actions: read

jobs:
  test:
    runs-on: [ "${{ github.event.inputs.chosen-os }}" ]
    steps:
      - uses: actions/checkout@v6
      
      - shell: bash
        run: |
          git config --global user.name "dirkarnez" && \
          git config --global user.email "smalldirkalex@gmail.com" && \
          git config --global core.fileMode false && \
          git config --global core.autocrlf false

      - shell: bash
        run: |
          git config core.fileMode false && \
          git config core.autocrlf false
          
      - shell: bash
        if: ${{ github.event.inputs.chosen-os != 'windows-latest' }}
        run: |
          sudo chmod -R +x . && \
          ls
      
    # The branch, tag or SHA to checkout. When checking out the repository that
    # triggered a workflow, this defaults to the reference or SHA for that event.
    # Otherwise, uses the default branch.

      - if: ${{ github.event.inputs.chosen-os != 'windows-latest' }}
        uses: stateful/vscode-server-action@v1
        with:
          timeout: '999999999'       # optional, default: 30000

      - if: ${{ github.event.inputs.chosen-os == 'windows-latest' }}
        uses: dirkarnez/vscode-server-action@main
        with:
          timeout: '999999999'       # optional, default: 30000
